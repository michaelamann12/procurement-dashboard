<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement & Curriculum Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --purple: #a78bfa;
            --orange: #fb923c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .header .subtitle { color: var(--muted); font-size: 0.85rem; }
        .refresh-info {
            color: var(--muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-info .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card .label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: white; }
        .stat-card .detail { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: white; }
        .card.full-width { grid-column: 1 / -1; }
        .pipeline-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .pipeline-table th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .pipeline-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .pipeline-table tr:last-child td { border-bottom: none; }
        .pipeline-table tr:hover { background: rgba(56, 189, 248, 0.05); }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-done { background: rgba(74, 222, 128, 0.15); color: var(--green); }
        .status-almost { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .status-started { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
        .status-not-started { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .status-na { background: rgba(148, 163, 184, 0.1); color: var(--muted); }
        .progress-bar-bg {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
        .legend {
            display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: var(--muted);
        }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 28px);
            gap: 4px;
        }
        .module-cell {
            width: 28px; height: 28px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; cursor: default;
        }
        .module-cell.done { background: rgba(74, 222, 128, 0.25); color: var(--green); }
        .module-cell.not-done { background: rgba(248, 113, 113, 0.12); color: var(--red); }
        .module-cell.na { background: rgba(148, 163, 184, 0.08); color: var(--muted); }
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); color: var(--accent); }
        .loading { text-align: center; padding: 60px; color: var(--muted); }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tooltip { position: relative; }
        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%); background: #475569; color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;
            white-space: nowrap; z-index: 10;
        }
        .priority-high { color: var(--red); }
        .priority-highest { color: #f43f5e; font-weight: 700; }
        .priority-medium { color: var(--yellow); }
        .priority-low { color: var(--muted); }
        .deadline-tag {
            font-size: 0.7rem; color: var(--orange);
            background: rgba(251, 146, 60, 0.1);
            padding: 2px 6px; border-radius: 4px;
        }

        /* ── Module badges ── */
        .module-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            margin: 2px 3px 2px 0;
            white-space: nowrap;
        }
        .module-badge.complete {
            background: rgba(74, 222, 128, 0.18);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.35);
        }
        .module-badge.partial {
            background: rgba(251, 191, 36, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .module-badge.none {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        /* ── Collapsible pipeline ── */
        .pipeline-wrapper {
            position: relative;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .pipeline-wrapper.collapsed {
            max-height: 400px;
        }
        .pipeline-wrapper.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, var(--card));
            pointer-events: none;
        }
        .pipeline-wrapper.expanded {
            max-height: none;
        }
        .expand-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expand-btn:hover {
            background: rgba(56, 189, 248, 0.08);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Procurement & Curriculum Pipeline</h1>
            <div class="subtitle">2026-27 Activity Creation</div>
        </div>
        <div class="refresh-info">
            <div class="dot"></div>
            <span id="lastRefresh">Loading...</span>
        </div>
    </div>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>Connecting to Google Sheets...</div>
        </div>
    </div>

    <script>
    const SHEET_ID = '1f7YOtX503uiQGC2f_MXTDiz5q-rPkhQ1yzSV0ir6Xak';

    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Procurement%20Final`;

    const CURRICULUM_NAMES = {
        'AM_AMP_TX': 'Amplify (TX)',
        'AM_AMP_XX': 'Amplify (Nat\'l)',
        'AM_CK3_XX': 'CKLA 3rd Ed',
        'AM_CK2_XX': 'CKLA 2nd Ed',
        'EL_1ST_XX': 'EL 1st Ed',
        'EL_2ND_XX': 'EL 2nd Ed',
        'EL_V25_XX': 'EL 2025',
        'FT_FTN_XX': 'Fishtank',
        'GM_AAL_XX': 'AAL',
        'GM_WNW_AF': 'W&W (AF)',
        'GM_WNW_XX': 'W&W (Nat\'l)',
        'HM_I2L_XX': 'Into Literature',
        'HM_V20_XX': 'HMH 2020',
        'LA_GDB_XX': 'Guidebooks',
        'MG_STS_DU': 'StudySync (Duval)',
        'MG_STS_FL': 'StudySync (FL)',
        'MG_STS_XX': 'StudySync (Nat\'l)',
        'NP_NOV_XX': 'Novels',
        'OE_SLP_XX': 'Savvas (OE)',
        'SV_MYP_XX': 'MyPerspectives',
        'SV_V25_XX': 'MyPerspectives 2025',
        'TX_BBO_XX': 'Bluebonnet',
        'TX_HOU_XX': 'Houston',
        'BE_BAD_XX': 'Be A Doer',
    };

    async function fetchGviz(url) {
        const resp = await fetch(url);
        const text = await resp.text();
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
        if (!jsonStr) throw new Error('Could not parse gviz response');
        const data = JSON.parse(jsonStr[1]);
        if (data.status === 'error') throw new Error(data.errors?.[0]?.detailed_message || 'Sheet access denied');
        const cols = data.table.cols.map(c => c.label || '');
        const rows = data.table.rows.map(r => r.c.map(cell => {
            if (!cell) return '';
            if (cell.v === null || cell.v === undefined) return '';
            // Preserve booleans as-is; only stringify other values
            if (typeof cell.v === 'boolean') return cell.v;
            return String(cell.v);
        }));
        return { cols, rows };
    }

    function parseProcurementFinal(data) {
        const { cols, rows } = data;
        // rows[0] is the header row — skip it (already consumed by fetchGviz cols)
        // Actually fetchGviz returns all data rows including what gviz treats as data
        // Row 0 in gviz data is the first data row (header was consumed as cols labels)
        const variants = [];
        const variantMap = new Map();

        let currentCode = '';
        let currentHeadline = '';
        let currentLink = '';

        for (const r of rows) {
            // Col A: CURR VAR ID (carry forward)
            const colA = typeof r[0] === 'string' ? r[0].trim() : '';
            const colB = typeof r[1] === 'string' ? r[1].trim() : '';
            const colC = typeof r[2] === 'string' ? r[2].trim() : '';
            // Col D: module number (float string like "6.0", or empty)
            const colD = r[3];
            // Col E: convention ("Module", "Unit", or empty)
            const colE = typeof r[4] === 'string' ? r[4].trim() : '';
            // Cols F onwards: booleans or empty strings
            const checkboxCols = r.slice(5);

            // Skip the header row (gviz returns it as a data row since col labels are blank)
            if (colA === 'CURR VAR ID') continue;

            if (colA) {
                currentCode = colA;
                currentHeadline = colB;
                currentLink = colC;
            }

            if (!currentCode) continue;

            // Parse module number
            let moduleNum = null;
            if (colD !== '' && colD !== null && colD !== undefined) {
                const n = parseFloat(String(colD));
                if (!isNaN(n)) moduleNum = Math.round(n);
            }

            // Skip structural filler rows (no module number and no convention label)
            if (moduleNum === null && !colE) continue;

            // Parse checkboxes: true = complete, false = incomplete, '' = N/A (skip)
            const checkboxes = [];
            for (const val of checkboxCols) {
                if (val === true) checkboxes.push(true);
                else if (val === false) checkboxes.push(false);
                else if (val === 'true' || val === 'TRUE') checkboxes.push(true);
                else if (val === 'false' || val === 'FALSE') checkboxes.push(false);
                // empty string or anything else = N/A, skip
            }

            const completedCount = checkboxes.filter(Boolean).length;
            const totalCount = checkboxes.length;

            const moduleEntry = {
                number: moduleNum,
                convention: colE || 'Module',
                checkboxes,
                completedCount,
                totalCount,
            };

            if (!variantMap.has(currentCode)) {
                const variant = {
                    code: currentCode,
                    headline: currentHeadline,
                    link: currentLink,
                    modules: [],
                    totalChecks: 0,
                    doneChecks: 0,
                    completionPct: 0,
                };
                variantMap.set(currentCode, variant);
                variants.push(variant);
            }

            const variant = variantMap.get(currentCode);
            variant.modules.push(moduleEntry);
            variant.totalChecks += totalCount;
            variant.doneChecks += completedCount;
        }

        // Compute completionPct for each variant
        for (const v of variants) {
            v.completionPct = v.totalChecks > 0
                ? Math.round(v.doneChecks / v.totalChecks * 100)
                : 0;
        }

        return variants;
    }

    function progressColor(pct) {
        if (pct >= 100) return 'var(--green)';
        if (pct >= 40) return 'var(--yellow)';
        if (pct > 0) return 'var(--accent)';
        return 'var(--red)';
    }

    let statusChartInstance = null;

    function render(variants) {
        const app = document.getElementById('app');

        const curricula = variants.length;
        const modulesTracked = variants.reduce((sum, v) => sum + v.modules.length, 0);
        const totalChecks = variants.reduce((sum, v) => sum + v.totalChecks, 0);
        const doneChecks = variants.reduce((sum, v) => sum + v.doneChecks, 0);
        const overallPct = totalChecks > 0 ? Math.round(doneChecks / totalChecks * 100) : 0;
        const fullyComplete = variants.filter(v => v.completionPct === 100).length;

        app.innerHTML = `
            <div class="stats-row">
                <div class="stat-card">
                    <div class="label">Curricula Tracked</div>
                    <div class="value">${curricula}</div>
                    <div class="detail">unique curriculum variants</div>
                </div>
                <div class="stat-card">
                    <div class="label">Modules Tracked</div>
                    <div class="value">${modulesTracked}</div>
                    <div class="detail">total module/unit rows</div>
                </div>
                <div class="stat-card">
                    <div class="label">Overall Completion</div>
                    <div class="value">${overallPct}%</div>
                    <div class="detail">${doneChecks} of ${totalChecks} checks done</div>
                </div>
                <div class="stat-card">
                    <div class="label">Fully Complete</div>
                    <div class="value">${fullyComplete}</div>
                    <div class="detail">variants at 100%</div>
                </div>
            </div>

            <div class="grid" style="margin-bottom: 32px;">
                <!-- Status donut -->
                <div class="card">
                    <h2>Completion Tier Distribution</h2>
                    <canvas id="statusChart" height="260"></canvas>
                </div>

                <!-- Placeholder for future chart -->
                <div class="card" style="display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--muted); font-size: 0.85rem; text-align: center; gap: 8px;">
                    <div style="font-size: 2rem; opacity: 0.3;">&#9635;</div>
                    <div>Timeline view removed<br><span style="font-size: 0.75rem;">No date data in this source</span></div>
                </div>
            </div>

            <!-- Main curriculum table -->
            <div class="card full-width" style="margin-bottom: 32px;">
                <h2>Curriculum Variant Detail</h2>
                <div class="pipeline-wrapper collapsed" id="pipelineWrapper">
                    <div id="variantTable"></div>
                </div>
                <button class="expand-btn" id="expandBtn" onclick="togglePipeline()">Show all rows</button>
            </div>
        `;

        renderStatusChart(variants);
        renderVariantTable(variants);
    }

    function renderStatusChart(variants) {
        const complete = variants.filter(v => v.completionPct === 100).length;
        const inProgress = variants.filter(v => v.completionPct > 0 && v.completionPct < 100).length;
        const notStarted = variants.filter(v => v.completionPct === 0).length;

        if (statusChartInstance) {
            statusChartInstance.destroy();
            statusChartInstance = null;
        }

        statusChartInstance = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: ['Complete (100%)', 'In Progress (1–99%)', 'Not Started (0%)'],
                datasets: [{
                    data: [complete, inProgress, notStarted],
                    backgroundColor: [
                        'rgba(74, 222, 128, 0.8)',
                        'rgba(56, 189, 248, 0.8)',
                        'rgba(248, 113, 113, 0.8)',
                    ],
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', padding: 12, usePointStyle: true, pointStyleWidth: 8 }
                    }
                }
            }
        });
    }

    function renderVariantTable(variants) {
        const container = document.getElementById('variantTable');

        let html = `<table class="pipeline-table">
            <thead><tr>
                <th>Curriculum</th>
                <th>Description</th>
                <th>Module Breakdown</th>
                <th>Overall Progress</th>
            </tr></thead><tbody>`;

        for (const v of variants) {
            const displayName = CURRICULUM_NAMES[v.code] || v.code;
            const headline = v.headline
                ? (v.headline.length > 80 ? v.headline.slice(0, 80) + '\u2026' : v.headline)
                : '\u2014';
            const fullHeadline = v.headline || '';

            // Module badges
            const badgeHtml = v.modules.map(m => {
                const label = (m.convention === 'Unit' ? 'U' : 'M') + (m.number !== null ? m.number : '—');
                const cls = m.totalCount === 0 ? 'none'
                    : m.completedCount === m.totalCount ? 'complete'
                    : m.completedCount > 0 ? 'partial'
                    : 'none';
                const tip = `${label}: ${m.completedCount}/${m.totalCount}`;
                return `<span class="module-badge ${cls} tooltip" data-tip="${tip}">${label}: ${m.completedCount}/${m.totalCount}</span>`;
            }).join('');

            // Progress bar
            const pct = v.completionPct;
            const barColor = progressColor(pct);

            html += `<tr>
                <td>
                    <strong>${displayName}</strong><br>
                    <span style="color: var(--muted); font-size: 0.75rem;">${v.code}</span>
                </td>
                <td style="max-width: 260px; font-size: 0.82rem; color: var(--muted);" title="${fullHeadline.replace(/"/g, '&quot;')}">${headline}</td>
                <td style="max-width: 320px;">${badgeHtml || '<span style="color: var(--muted)">—</span>'}</td>
                <td style="min-width: 120px;">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${pct}%; background: ${barColor};"></div>
                    </div>
                    <div class="progress-text">${pct}% &nbsp;(${v.doneChecks}/${v.totalChecks})</div>
                </td>
            </tr>`;
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function togglePipeline() {
        const wrapper = document.getElementById('pipelineWrapper');
        const btn = document.getElementById('expandBtn');
        if (wrapper.classList.contains('collapsed')) {
            wrapper.classList.remove('collapsed');
            wrapper.classList.add('expanded');
            btn.textContent = 'Show less';
        } else {
            wrapper.classList.remove('expanded');
            wrapper.classList.add('collapsed');
            btn.textContent = 'Show all rows';
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    async function main() {
        try {
            const data = await fetchGviz(DATA_URL);
            const variants = parseProcurementFinal(data);

            render(variants);
            document.getElementById('lastRefresh').textContent =
                `Live from Google Sheets \u00b7 ${new Date().toLocaleString()}`;

        } catch (err) {
            console.error('Data fetch failed:', err);

            document.getElementById('app').innerHTML = `
                <div class="card" style="max-width: 600px; margin: 60px auto; text-align: center;">
                    <h2 style="margin-bottom: 12px;">Setup Required</h2>
                    <p style="color: var(--muted); margin-bottom: 20px;">
                        The dashboard needs read access to your Google Sheet.
                    </p>
                    <div style="text-align: left; margin-bottom: 20px;">
                        <p style="margin-bottom: 8px;"><strong>Share the sheet:</strong></p>
                        <ol style="color: var(--muted); font-size: 0.85rem; padding-left: 20px; line-height: 1.8;">
                            <li>Open the Google Sheet</li>
                            <li>Click <strong>Share</strong> &rarr; <strong>General access</strong> &rarr; <strong>"Anyone with the link"</strong> &rarr; <strong>Viewer</strong></li>
                            <li>Reload this page</li>
                        </ol>
                    </div>
                    <p style="color: var(--muted); font-size: 0.8rem;">Error: ${err.message}</p>
                </div>
            `;
        }
    }

    main();
    setInterval(main, 5 * 60 * 1000);
    </script>
</body>
</html>
