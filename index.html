<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement & Curriculum Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --purple: #a78bfa;
            --orange: #fb923c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .header .subtitle { color: var(--muted); font-size: 0.85rem; }
        .refresh-info {
            color: var(--muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-info .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card .label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: white; }
        .stat-card .detail { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: white; }
        .card.full-width { grid-column: 1 / -1; }
        .pipeline-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .pipeline-table th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .pipeline-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .pipeline-table tr:last-child td { border-bottom: none; }
        .pipeline-table tr:hover { background: rgba(56, 189, 248, 0.05); }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-done { background: rgba(74, 222, 128, 0.15); color: var(--green); }
        .status-almost { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .status-started { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
        .status-not-started { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .status-na { background: rgba(148, 163, 184, 0.1); color: var(--muted); }
        .progress-bar-bg {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
        .legend {
            display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: var(--muted);
        }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 28px);
            gap: 4px;
        }
        .module-cell {
            width: 28px; height: 28px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; cursor: default;
        }
        .module-cell.done { background: rgba(74, 222, 128, 0.25); color: var(--green); }
        .module-cell.not-done { background: rgba(248, 113, 113, 0.12); color: var(--red); }
        .module-cell.na { background: rgba(148, 163, 184, 0.08); color: var(--muted); }
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); color: var(--accent); }
        .loading { text-align: center; padding: 60px; color: var(--muted); }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tooltip { position: relative; }
        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%); background: #475569; color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;
            white-space: nowrap; z-index: 10;
        }
        .priority-high { color: var(--red); }
        .priority-highest { color: #f43f5e; font-weight: 700; }
        .priority-medium { color: var(--yellow); }
        .priority-low { color: var(--muted); }
        .deadline-tag {
            font-size: 0.7rem; color: var(--orange);
            background: rgba(251, 146, 60, 0.1);
            padding: 2px 6px; border-radius: 4px;
        }

        /* ── Module badges ── */
        .module-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            margin: 2px 3px 2px 0;
            white-space: nowrap;
        }
        .module-badge.complete {
            background: rgba(74, 222, 128, 0.18);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, 0.35);
        }
        .module-badge.partial {
            background: rgba(251, 191, 36, 0.15);
            color: var(--yellow);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        .module-badge.none {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        /* ── Collapsible pipeline ── */
        .pipeline-wrapper {
            position: relative;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .pipeline-wrapper.collapsed {
            max-height: 400px;
        }
        .pipeline-wrapper.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, var(--card));
            pointer-events: none;
        }
        .pipeline-wrapper.expanded {
            max-height: none;
        }
        .expand-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expand-btn:hover {
            background: rgba(56, 189, 248, 0.08);
            border-color: var(--accent);
        }

        /* ── Ready for Authoring banner ── */
        .ready-banner {
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .ready-banner-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .ready-banner-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--green);
        }
        .ready-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            padding: 0 6px;
            border-radius: 99px;
            background: var(--green);
            color: #0f172a;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .ready-banner-sub {
            color: var(--muted);
            font-size: 0.78rem;
            margin-top: 3px;
            padding-left: 38px;
        }
        .ready-curriculum-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .ready-curriculum-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.25);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.85rem;
        }
        .ready-curriculum-chip strong { color: white; }
        .ready-chip-modules {
            color: var(--green);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .ready-chip-check {
            color: var(--green);
            font-size: 0.9rem;
        }

        /* ── Collapsible description ── */
        .desc-short { display: block; }
        .desc-full  { display: none; }
        .desc-toggle {
            display: inline-block;
            margin-top: 4px;
            color: var(--accent);
            font-size: 0.72rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .desc-toggle:hover { text-decoration: underline; }
        .desc-expanded .desc-short { display: none; }
        .desc-expanded .desc-full  { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Procurement & Curriculum Pipeline</h1>
            <div class="subtitle">2026-27 Activity Creation</div>
        </div>
        <div class="refresh-info">
            <div class="dot"></div>
            <span id="lastRefresh">Loading...</span>
        </div>
    </div>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>Connecting to Google Sheets...</div>
        </div>
    </div>

    <script>
    const SHEET_ID = '1f7YOtX503uiQGC2f_MXTDiz5q-rPkhQ1yzSV0ir6Xak';

    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Procurement%20Final`;

    const CURRICULUM_NAMES = {
        'AM_AMP_TX': 'Amplify (TX)',
        'AM_AMP_XX': 'Amplify (Nat\'l)',
        'AM_CK3_XX': 'CKLA 3rd Ed',
        'AM_CK2_XX': 'CKLA 2nd Ed',
        'EL_1ST_XX': 'EL 1st Ed',
        'EL_2ND_XX': 'EL 2nd Ed',
        'EL_V25_XX': 'EL 2025',
        'FT_FTN_XX': 'Fishtank',
        'GM_AAL_XX': 'AAL',
        'GM_WNW_AF': 'W&W (AF)',
        'GM_WNW_XX': 'W&W (Nat\'l)',
        'HM_I2L_XX': 'Into Literature',
        'HM_V20_XX': 'HMH 2020',
        'LA_GDB_XX': 'Guidebooks',
        'MG_STS_DU': 'StudySync (Duval)',
        'MG_STS_FL': 'StudySync (FL)',
        'MG_STS_XX': 'StudySync (Nat\'l)',
        'NP_NOV_XX': 'Novels',
        'OE_SLP_XX': 'Savvas (OE)',
        'SV_MYP_XX': 'MyPerspectives',
        'SV_V25_XX': 'MyPerspectives 2025',
        'TX_BBO_XX': 'Bluebonnet',
        'TX_HOU_XX': 'Houston',
        'BE_BAD_XX': 'Be A Doer',
    };

    async function fetchGviz(url) {
        const resp = await fetch(url);
        const text = await resp.text();
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
        if (!jsonStr) throw new Error('Could not parse gviz response');
        const data = JSON.parse(jsonStr[1]);
        if (data.status === 'error') throw new Error(data.errors?.[0]?.detailed_message || 'Sheet access denied');
        const cols = data.table.cols.map(c => c.label || '');
        const rows = data.table.rows.map(r => r.c.map(cell => {
            if (!cell) return '';
            if (cell.v === null || cell.v === undefined) return '';
            // Preserve booleans as-is; only stringify other values
            if (typeof cell.v === 'boolean') return cell.v;
            return String(cell.v);
        }));
        return { cols, rows };
    }

    function parseProcurementFinal(data) {
        const { cols, rows } = data;
        // Column layout (actual sheet headers):
        //   A: CURR VAR ID   B: Headline   C: Link
        //   D: Grades Assigned (grade level, e.g. 6)
        //   E: Convention ("Module" or "Unit")
        //   F-O: Module/Unit numbers 1–10 (boolean checkboxes; null = N/A for this grade)
        const variants = [];
        const variantMap = new Map();

        let currentCode = '';
        let currentHeadline = '';
        let currentLink = '';

        for (const r of rows) {
            const colA = typeof r[0] === 'string' ? r[0].trim() : '';
            const colB = typeof r[1] === 'string' ? r[1].trim() : '';
            const colC = typeof r[2] === 'string' ? r[2].trim() : '';
            // Col D: grade level (float like "6.0")
            const colD = r[3];
            // Col E: convention ("Module", "Unit", or empty)
            const colE = typeof r[4] === 'string' ? r[4].trim() : '';
            // Cols F–O: module/unit numbers 1–10 (boolean; empty string = N/A)
            const checkboxCols = r.slice(5, 15);

            // Skip the header row (gviz returns it as a data row since col labels are blank)
            if (colA === 'CURR VAR ID') continue;

            if (colA) {
                currentCode = colA;
                currentHeadline = colB;
                currentLink = colC;
            }

            if (!currentCode) continue;

            // Parse grade level
            let gradeNum = null;
            if (colD !== '' && colD !== null && colD !== undefined) {
                const n = parseFloat(String(colD));
                if (!isNaN(n)) gradeNum = Math.round(n);
            }

            // Skip structural filler rows (no grade and no convention label)
            if (gradeNum === null && !colE) continue;

            // Parse which module/unit numbers are checked.
            // Index 0 = Module/Unit 1, index 1 = Module/Unit 2, ..., index 9 = Module/Unit 10.
            // true = procured, false = not yet, '' (empty string) = N/A for this grade.
            const moduleSlots = [];
            for (let i = 0; i < checkboxCols.length; i++) {
                const val = checkboxCols[i];
                if (val === true || val === 'true' || val === 'TRUE') {
                    moduleSlots.push({ number: i + 1, checked: true });
                } else if (val === false || val === 'false' || val === 'FALSE') {
                    moduleSlots.push({ number: i + 1, checked: false });
                }
                // empty string = N/A — this module/unit doesn't exist for this grade; skip
            }

            const doneModules  = moduleSlots.filter(m => m.checked).length;
            const totalModules = moduleSlots.length;

            const gradeEntry = {
                grade: gradeNum,
                convention: colE || 'Module',
                moduleSlots,   // [{number: 1, checked: true}, ...]
                doneModules,
                totalModules,
            };

            if (!variantMap.has(currentCode)) {
                const variant = {
                    code: currentCode,
                    headline: currentHeadline,
                    link: currentLink,
                    grades: [],
                    totalChecks: 0,
                    doneChecks: 0,
                    completionPct: 0,
                };
                variantMap.set(currentCode, variant);
                variants.push(variant);
            }

            const variant = variantMap.get(currentCode);
            variant.grades.push(gradeEntry);
            variant.totalChecks += totalModules;
            variant.doneChecks  += doneModules;
        }

        for (const v of variants) {
            v.completionPct = v.totalChecks > 0
                ? Math.round(v.doneChecks / v.totalChecks * 100)
                : 0;
        }

        return variants;
    }

    function progressColor(pct) {
        if (pct >= 100) return 'var(--green)';
        if (pct >= 40) return 'var(--yellow)';
        if (pct > 0) return 'var(--accent)';
        return 'var(--red)';
    }

    let statusChartInstance = null;

    // A grade row is "ready" if any of its module slots are checked
    function gradeIsReady(g) { return g.doneModules > 0; }

    // Count total ready module-slots across all grades of a variant
    function variantReadySlots(v) {
        return v.grades.reduce((sum, g) => sum + g.doneModules, 0);
    }

    function render(variants) {
        const app = document.getElementById('app');

        // Slot-level stats: each checked checkbox = one procured module slot
        const allSlots     = variants.flatMap(v => v.grades.flatMap(g => g.moduleSlots));
        const readySlots   = allSlots.filter(s => s.checked).length;
        const notReadySlots = allSlots.filter(s => !s.checked).length;

        // Ready curricula: those with at least one procured slot
        const readyVariants = variants.filter(v => variantReadySlots(v) > 0);

        // Sort: most ready slots first, then by completion pct
        const sortedVariants = [...variants].sort((a, b) => {
            const diff = variantReadySlots(b) - variantReadySlots(a);
            return diff !== 0 ? diff : b.completionPct - a.completionPct;
        });

        const curricula  = variants.length;
        const totalChecks = variants.reduce((sum, v) => sum + v.totalChecks, 0);
        const doneChecks  = variants.reduce((sum, v) => sum + v.doneChecks, 0);
        const overallPct  = totalChecks > 0 ? Math.round(doneChecks / totalChecks * 100) : 0;

        // Ready for Authoring banner — one chip per ready curriculum
        let readySectionHtml = '';
        if (readyVariants.length > 0) {
            const chips = readyVariants.map(v => {
                const name = CURRICULUM_NAMES[v.code] || v.code;
                // Summarise each grade: "G6: M1–M7" style
                const gradeSummaries = v.grades
                    .filter(gradeIsReady)
                    .map(g => {
                        const conv = g.convention === 'Unit' ? 'U' : 'M';
                        const gradeLabel = g.grade !== null ? `G${g.grade}` : '—';
                        const readyNums = g.moduleSlots.filter(s => s.checked).map(s => `${conv}${s.number}`).join(', ');
                        return `${gradeLabel}: ${readyNums}`;
                    }).join(' &nbsp;·&nbsp; ');
                return `<div class="ready-curriculum-chip">
                    <span class="ready-chip-check">&#10003;</span>
                    <strong>${name}</strong>
                    <span class="ready-chip-modules">${gradeSummaries}</span>
                </div>`;
            }).join('');

            readySectionHtml = `
            <div class="ready-banner">
                <div class="ready-banner-header">
                    <div>
                        <div class="ready-banner-title">
                            <span class="ready-count-badge">${readySlots}</span>
                            Module Slots Ready for Authoring Prep
                        </div>
                        <div class="ready-banner-sub">Any check on a module = procurement complete &mdash; ready to move in Jira</div>
                    </div>
                </div>
                <div class="ready-curriculum-list">${chips}</div>
            </div>`;
        }

        app.innerHTML = `
            ${readySectionHtml}

            <!-- Main curriculum table -->
            <div class="card full-width" style="margin-bottom: 32px;">
                <h2>Curriculum Variant Detail</h2>
                <div class="pipeline-wrapper collapsed" id="pipelineWrapper">
                    <div id="variantTable"></div>
                </div>
                <button class="expand-btn" id="expandBtn" onclick="togglePipeline()">Show all rows</button>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <div class="label">Curricula Tracked</div>
                    <div class="value">${curricula}</div>
                    <div class="detail">unique curriculum variants</div>
                </div>
                <div class="stat-card">
                    <div class="label">Ready Slots</div>
                    <div class="value" style="color: var(--green);">${readySlots}</div>
                    <div class="detail">module-grade slots procured</div>
                </div>
                <div class="stat-card">
                    <div class="label">Not Ready</div>
                    <div class="value" style="color: var(--red);">${notReadySlots}</div>
                    <div class="detail">slots not yet procured</div>
                </div>
                <div class="stat-card">
                    <div class="label">Procurement Progress</div>
                    <div class="value">${overallPct}%</div>
                    <div class="detail">${doneChecks} of ${totalChecks} slots done</div>
                </div>
            </div>

            <div class="grid" style="margin-bottom: 32px;">
                <div class="card">
                    <h2>Module Slot Readiness</h2>
                    <canvas id="statusChart" height="260"></canvas>
                </div>
                <div class="card" style="display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--muted); font-size: 0.85rem; text-align: center; gap: 8px;">
                    <div style="font-size: 2rem; opacity: 0.3;">&#9635;</div>
                    <div>Timeline view<br><span style="font-size: 0.75rem;">No date data in this source</span></div>
                </div>
            </div>

        `;

        renderStatusChart(readySlots, notReadySlots);
        renderVariantTable(sortedVariants);
    }

    function renderStatusChart(ready, notReady) {
        if (statusChartInstance) {
            statusChartInstance.destroy();
            statusChartInstance = null;
        }

        statusChartInstance = new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: ['Ready for Authoring', 'Not Yet Ready'],
                datasets: [{
                    data: [ready, notReady],
                    backgroundColor: [
                        'rgba(74, 222, 128, 0.8)',
                        'rgba(248, 113, 113, 0.8)',
                    ],
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', padding: 12, usePointStyle: true, pointStyleWidth: 8 }
                    }
                }
            }
        });
    }

    function renderVariantTable(variants) {
        const container = document.getElementById('variantTable');

        let html = `<table class="pipeline-table">
            <thead><tr>
                <th>Curriculum</th>
                <th>Description</th>
                <th>Grade &amp; Module Breakdown</th>
                <th>Procurement Progress</th>
            </tr></thead><tbody>`;

        let descIdx = 0;
        for (const v of variants) {
            const displayName = CURRICULUM_NAMES[v.code] || v.code;
            const fullHeadline = v.headline || '';
            const SHORT_LEN = 80;
            const needsToggle = fullHeadline.length > SHORT_LEN;
            const shortHeadline = needsToggle ? fullHeadline.slice(0, SHORT_LEN) + '\u2026' : fullHeadline;
            const idx = descIdx++;
            const descHtml = fullHeadline
                ? (needsToggle
                    ? `<span class="desc-short">${shortHeadline}</span>
                       <span class="desc-full">${fullHeadline}</span>
                       <button class="desc-toggle" onclick="toggleDesc(${idx})">Show more</button>`
                    : fullHeadline)
                : '\u2014';

            // Per-grade rows: each grade gets a label + module slot badges
            const gradeRowsHtml = v.grades.map(g => {
                const conv = g.convention === 'Unit' ? 'U' : 'M';
                const gradeLabel = g.grade !== null ? `G${g.grade}` : '—';
                const slotBadges = g.moduleSlots.map(s => {
                    const cls = s.checked ? 'complete' : 'none';
                    const tip = `${conv}${s.number}: ${s.checked ? 'procured' : 'not yet'}`;
                    return `<span class="module-badge ${cls} tooltip" data-tip="${tip}">${conv}${s.number}</span>`;
                }).join('');
                return `<div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;">
                    <span style="color:var(--muted); font-size:0.72rem; font-weight:600; min-width:26px;">${gradeLabel}</span>
                    <div style="display:flex; flex-wrap:wrap; gap:3px;">${slotBadges || '<span style="color:var(--muted)">—</span>'}</div>
                </div>`;
            }).join('');

            const pct = v.completionPct;
            const barColor = progressColor(pct);

            html += `<tr>
                <td>
                    <strong>${displayName}</strong><br>
                    <span style="color: var(--muted); font-size: 0.75rem;">${v.code}</span>
                </td>
                <td style="max-width: 220px; font-size: 0.82rem; color: var(--muted);" id="desc-cell-${idx}">${descHtml}</td>
                <td style="max-width: 380px;">${gradeRowsHtml || '<span style="color:var(--muted)">—</span>'}</td>
                <td style="min-width: 120px;">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${pct}%; background: ${barColor};"></div>
                    </div>
                    <div class="progress-text">${pct}% &nbsp;(${v.doneChecks}/${v.totalChecks})</div>
                </td>
            </tr>`;
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function toggleDesc(idx) {
        const cell = document.getElementById(`desc-cell-${idx}`);
        const btn  = cell.querySelector('.desc-toggle');
        const expanded = cell.classList.toggle('desc-expanded');
        btn.textContent = expanded ? 'Show less' : 'Show more';
    }

    function togglePipeline() {
        const wrapper = document.getElementById('pipelineWrapper');
        const btn = document.getElementById('expandBtn');
        if (wrapper.classList.contains('collapsed')) {
            wrapper.classList.remove('collapsed');
            wrapper.classList.add('expanded');
            btn.textContent = 'Show less';
        } else {
            wrapper.classList.remove('expanded');
            wrapper.classList.add('collapsed');
            btn.textContent = 'Show all rows';
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    async function main() {
        try {
            const data = await fetchGviz(DATA_URL);
            const variants = parseProcurementFinal(data);

            render(variants);
            document.getElementById('lastRefresh').textContent =
                `Live from Google Sheets \u00b7 ${new Date().toLocaleString()}`;

        } catch (err) {
            console.error('Data fetch failed:', err);

            document.getElementById('app').innerHTML = `
                <div class="card" style="max-width: 600px; margin: 60px auto; text-align: center;">
                    <h2 style="margin-bottom: 12px;">Setup Required</h2>
                    <p style="color: var(--muted); margin-bottom: 20px;">
                        The dashboard needs read access to your Google Sheet.
                    </p>
                    <div style="text-align: left; margin-bottom: 20px;">
                        <p style="margin-bottom: 8px;"><strong>Share the sheet:</strong></p>
                        <ol style="color: var(--muted); font-size: 0.85rem; padding-left: 20px; line-height: 1.8;">
                            <li>Open the Google Sheet</li>
                            <li>Click <strong>Share</strong> &rarr; <strong>General access</strong> &rarr; <strong>"Anyone with the link"</strong> &rarr; <strong>Viewer</strong></li>
                            <li>Reload this page</li>
                        </ol>
                    </div>
                    <p style="color: var(--muted); font-size: 0.8rem;">Error: ${err.message}</p>
                </div>
            `;
        }
    }

    main();
    setInterval(main, 5 * 60 * 1000);
    </script>
</body>
</html>
