<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement & Curriculum Pipeline</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --green: #4ade80;
            --yellow: #fbbf24;
            --red: #f87171;
            --purple: #a78bfa;
            --orange: #fb923c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .header .subtitle { color: var(--muted); font-size: 0.85rem; }
        .refresh-info {
            color: var(--muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-info .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-card .label {
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: white; }
        .stat-card .detail { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: white; }
        .card.full-width { grid-column: 1 / -1; }
        .pipeline-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .pipeline-table th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .pipeline-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .pipeline-table tr:last-child td { border-bottom: none; }
        .pipeline-table tr:hover { background: rgba(56, 189, 248, 0.05); }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .status-done { background: rgba(74, 222, 128, 0.15); color: var(--green); }
        .status-almost { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .status-started { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
        .status-not-started { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .status-na { background: rgba(148, 163, 184, 0.1); color: var(--muted); }
        .progress-bar-bg {
            width: 100%; height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
        .legend {
            display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: var(--muted);
        }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 28px);
            gap: 4px;
        }
        .module-cell {
            width: 28px; height: 28px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; cursor: default;
        }
        .module-cell.done { background: rgba(74, 222, 128, 0.25); color: var(--green); }
        .module-cell.not-done { background: rgba(248, 113, 113, 0.12); color: var(--red); }
        .module-cell.na { background: rgba(148, 163, 184, 0.08); color: var(--muted); }
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); color: var(--accent); }
        .loading { text-align: center; padding: 60px; color: var(--muted); }
        .loading .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tooltip { position: relative; }
        .tooltip:hover::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%); background: #475569; color: white;
            padding: 4px 8px; border-radius: 4px; font-size: 0.7rem;
            white-space: nowrap; z-index: 10;
        }
        .priority-high { color: var(--red); }
        .priority-highest { color: #f43f5e; font-weight: 700; }
        .priority-medium { color: var(--yellow); }
        .priority-low { color: var(--muted); }
        .deadline-tag {
            font-size: 0.7rem; color: var(--orange);
            background: rgba(251, 146, 60, 0.1);
            padding: 2px 6px; border-radius: 4px;
        }

        /* ── Headlines ── */
        .headlines-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .headlines-card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: white;
        }
        .headline-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .headline-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .headline-item .hl-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 1px;
        }
        .headline-item.hl-urgent {
            background: rgba(248, 113, 113, 0.08);
        }
        .headline-item.hl-urgent .hl-icon {
            background: rgba(248, 113, 113, 0.2);
            color: var(--red);
        }
        .headline-item.hl-warning {
            background: rgba(251, 191, 36, 0.06);
        }
        .headline-item.hl-warning .hl-icon {
            background: rgba(251, 191, 36, 0.15);
            color: var(--yellow);
        }
        .headline-item.hl-good {
            background: rgba(74, 222, 128, 0.06);
        }
        .headline-item.hl-good .hl-icon {
            background: rgba(74, 222, 128, 0.15);
            color: var(--green);
        }
        .headline-item.hl-info {
            background: rgba(56, 189, 248, 0.06);
        }
        .headline-item.hl-info .hl-icon {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
        }
        .headline-item .hl-text strong {
            color: white;
        }

        /* ── Timeline styles ── */
        .timeline-container {
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .timeline-chart {
            min-width: 700px;
            position: relative;
        }
        .timeline-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        .timeline-label-col {
            width: 160px;
            flex-shrink: 0;
            padding: 6px 12px 6px 0;
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .timeline-months {
            flex: 1;
            display: flex;
            position: relative;
        }
        .timeline-month {
            flex: 1;
            text-align: center;
            font-size: 0.7rem;
            color: var(--muted);
            padding: 6px 0;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        .timeline-month.current {
            color: var(--accent);
            font-weight: 600;
        }
        .timeline-row {
            display: flex;
            align-items: center;
            min-height: 36px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .timeline-row:hover {
            background: rgba(56, 189, 248, 0.03);
        }
        .timeline-row-label {
            width: 160px;
            flex-shrink: 0;
            padding-right: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timeline-row-bars {
            flex: 1;
            position: relative;
            height: 28px;
            display: flex;
        }
        .timeline-bar {
            position: absolute;
            height: 20px;
            top: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            cursor: default;
            min-width: 2px;
        }
        .timeline-bar:hover {
            filter: brightness(1.2);
            z-index: 2;
        }
        .timeline-bar.done {
            background: rgba(74, 222, 128, 0.5);
            border: 1px solid rgba(74, 222, 128, 0.7);
        }
        .timeline-bar.in-progress {
            background: rgba(56, 189, 248, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.6);
        }
        .timeline-bar.upcoming {
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.3);
        }
        .timeline-bar.almost {
            background: rgba(251, 191, 36, 0.4);
            border: 1px solid rgba(251, 191, 36, 0.6);
        }
        .timeline-now {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            z-index: 3;
            opacity: 0.6;
        }
        .timeline-now::after {
            content: 'Today';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .timeline-grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.04);
        }
        .timeline-section-label {
            padding: 8px 0 4px;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Procurement & Curriculum Pipeline</h1>
            <div class="subtitle">2026-27 Activity Creation</div>
        </div>
        <div class="refresh-info">
            <div class="dot"></div>
            <span id="lastRefresh">Loading...</span>
        </div>
    </div>

    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>Connecting to Google Sheets...</div>
        </div>
    </div>

    <script>
    const SHEET_ID = '1f7YOtX503uiQGC2f_MXTDiz5q-rPkhQ1yzSV0ir6Xak';
    let APPS_SCRIPT_URL = localStorage.getItem('appsScriptUrl') || '';

    const CSV_URLS = {
        procurement: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=2037193503`,
        assignments: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=814508291`,
    };

    const CURRICULUM_NAMES = {
        'AM_AMP_TX': 'Amplify (TX)',
        'AM_AMP_XX': 'Amplify (Nat\'l)',
        'AM_CK3_XX': 'CKLA 3rd Ed',
        'AM_CK2_XX': 'CKLA 2nd Ed',
        'EL_1ST_XX': 'EL 1st Ed',
        'EL_2ND_XX': 'EL 2nd Ed',
        'EL_V25_XX': 'EL 2025',
        'FT_FTN_XX': 'Fishtank',
        'GM_AAL_XX': 'AAL',
        'GM_WNW_AF': 'W&W (AF)',
        'GM_WNW_XX': 'W&W (Nat\'l)',
        'HM_I2L_XX': 'Into Literature',
        'HM_V20_XX': 'HMH 2020',
        'LA_GDB_XX': 'Guidebooks',
        'MG_STS_DU': 'StudySync (Duval)',
        'MG_STS_FL': 'StudySync (FL)',
        'MG_STS_XX': 'StudySync (Nat\'l)',
        'NP_NOV_XX': 'Novels',
        'OE_SLP_XX': 'Savvas (OE)',
        'SV_MYP_XX': 'MyPerspectives',
        'SV_V25_XX': 'MyPerspectives 2025',
        'TX_BBO_XX': 'Bluebonnet',
        'TX_HOU_XX': 'Houston',
    };

    async function fetchGviz(url) {
        const resp = await fetch(url);
        const text = await resp.text();
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/);
        if (!jsonStr) throw new Error('Could not parse gviz response');
        const data = JSON.parse(jsonStr[1]);
        if (data.status === 'error') throw new Error(data.errors?.[0]?.detailed_message || 'Sheet access denied');
        const cols = data.table.cols.map(c => c.label || '');
        const rows = data.table.rows.map(r => r.c.map(cell => {
            if (!cell) return '';
            if (cell.v === null || cell.v === undefined) return '';
            return String(cell.v);
        }));
        return { cols, rows };
    }

    function parseProcurement(cols, rows) {
        return rows.filter(r => r[0] && r[0].trim()).map(r => ({
            code: r[0]?.trim() || '',
            teamLead: r[1]?.trim() || '',
            designLead: r[2]?.trim() || '',
            procurementStatus: r[3]?.trim() || '',
            fileConventionsStatus: r[4]?.trim() || '',
            assignments: r[5]?.trim() || '',
            nextStep: r[6]?.trim() || '',
            notes: r[7]?.trim() || '',
            priority: r[8]?.trim() || '',
            startDate: r[9]?.trim() || '',
        }));
    }

    function parseAssignments(cols, rows) {
        const dataRows = rows.slice(1);
        const items = [];
        let currentCurriculum = '';
        let currentDescription = '';
        let currentContractor = '';

        for (const r of dataRows) {
            if (r[0] && r[0].trim()) {
                currentCurriculum = r[0].trim();
                currentDescription = r[1]?.trim() || '';
            }
            if (r[3] && r[3].trim()) {
                currentContractor = r[3].trim();
            }
            const grade = r[4]?.trim() || '';
            const task = r[5]?.trim() || '';
            const deadline = r[6]?.trim() || '';
            const convention = r[7]?.trim() || '';
            if (!grade || !task) continue;

            const progress = [];
            for (let i = 8; i < r.length; i++) {
                const val = r[i]?.trim().toUpperCase();
                if (val === 'TRUE') progress.push(true);
                else if (val === 'FALSE') progress.push(false);
                else if (val === 'N/A') progress.push(null);
                else if (val) progress.push(false);
            }

            items.push({
                curriculum: currentCurriculum,
                description: currentDescription,
                contractor: currentContractor,
                grade, task, deadline, convention, progress,
            });
        }
        return items;
    }

    function statusClass(status) {
        const s = status.toLowerCase();
        if (s.includes('done')) return 'status-done';
        if (s.includes('almost')) return 'status-almost';
        if (s.includes('started')) return 'status-started';
        if (s.includes('not started')) return 'status-not-started';
        return 'status-na';
    }

    function priorityClass(priority) {
        const p = priority.toLowerCase();
        if (p === 'highest') return 'priority-highest';
        if (p === 'high') return 'priority-high';
        if (p === 'medium') return 'priority-medium';
        return 'priority-low';
    }

    function progressColor(pct) {
        if (pct >= 0.8) return 'var(--green)';
        if (pct >= 0.4) return 'var(--yellow)';
        if (pct > 0) return 'var(--accent)';
        return 'var(--red)';
    }

    // ── Parse a start date like "3/1", "4/15", "Rolling" into a Date (year 2026) ──
    function parseStartDate(str) {
        if (!str || str === 'Rolling' || str === 'N/A' || str === '#N/A') return null;
        const parts = str.split('/');
        if (parts.length === 2) {
            const month = parseInt(parts[0]) - 1;
            const day = parseInt(parts[1]);
            if (!isNaN(month) && !isNaN(day)) return new Date(2026, month, day);
        }
        return null;
    }

    // ── Estimate end date from status and start ──
    function estimateEndDate(proc, startDate) {
        const s = proc.procurementStatus.toLowerCase();
        if (s.includes('done')) {
            // Already done — bar ends at start + 2 weeks (or today if no start)
            if (startDate) return new Date(Math.min(startDate.getTime() + 14 * 86400000, Date.now()));
            return new Date(Date.now() - 7 * 86400000);
        }
        if (s.includes('almost')) {
            // Almost done — ends ~1 week from now
            return new Date(Date.now() + 7 * 86400000);
        }
        if (s === 'started') {
            // In progress — estimate based on priority
            const p = proc.priority.toLowerCase();
            if (p === 'highest') return new Date(Date.now() + 21 * 86400000);
            if (p === 'high') return new Date(Date.now() + 30 * 86400000);
            return new Date(Date.now() + 45 * 86400000);
        }
        if (s === 'not started') {
            // Not started — project from start date
            if (startDate) return new Date(startDate.getTime() + 45 * 86400000);
            return new Date(2026, 4, 15); // May 15 default
        }
        return null;
    }

    function timelineBarClass(status) {
        const s = status.toLowerCase();
        if (s.includes('done')) return 'done';
        if (s.includes('almost')) return 'almost';
        if (s === 'started') return 'in-progress';
        return 'upcoming';
    }

    // ── Render ──
    function render(procurement, assignments) {
        const app = document.getElementById('app');

        const totalProducts = procurement.filter(p =>
            !['N/A', 'Hold', ''].includes(p.procurementStatus) &&
            !p.procurementStatus.toLowerCase().includes('n/a')
        ).length;
        const doneProducts = procurement.filter(p =>
            p.procurementStatus.toLowerCase().includes('done')
        ).length;
        const startedProducts = procurement.filter(p =>
            p.procurementStatus.toLowerCase() === 'started' ||
            p.procurementStatus.toLowerCase() === 'almost done'
        ).length;

        const allChecks = assignments.flatMap(a => a.progress.filter(p => p !== null));
        const doneChecks = allChecks.filter(Boolean).length;
        const totalChecks = allChecks.length;

        app.innerHTML = `
            <div class="stats-row">
                <div class="stat-card">
                    <div class="label">Overall Module Progress</div>
                    <div class="value">${totalChecks ? Math.round(doneChecks / totalChecks * 100) : 0}%</div>
                    <div class="detail">${doneChecks} of ${totalChecks} units/modules complete</div>
                </div>
                <div class="stat-card">
                    <div class="label">Products Online</div>
                    <div class="value">${doneProducts}</div>
                    <div class="detail">of ${totalProducts} active products</div>
                </div>
                <div class="stat-card">
                    <div class="label">In Progress</div>
                    <div class="value">${startedProducts}</div>
                    <div class="detail">started or almost done</div>
                </div>
                <div class="stat-card">
                    <div class="label">Not Started</div>
                    <div class="value">${totalProducts - doneProducts - startedProducts}</div>
                    <div class="detail">awaiting kickoff</div>
                </div>
            </div>

            <!-- Headlines -->
            <div class="headlines-card">
                <h2>Weekly Highlights</h2>
                <div id="headlines" class="headline-list"></div>
            </div>

            <div class="grid">
                <!-- Timeline -->
                <div class="card full-width">
                    <h2>Procurement Timeline</h2>
                    <div class="legend">
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(74, 222, 128, 0.5)"></div> Done</div>
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(251, 191, 36, 0.4)"></div> Almost Done</div>
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(56, 189, 248, 0.4)"></div> In Progress</div>
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(148, 163, 184, 0.15); border: 1px solid rgba(148, 163, 184, 0.3)"></div> Upcoming</div>
                    </div>
                    <div id="timeline"></div>
                </div>

                <!-- Status donut -->
                <div class="card">
                    <h2>Procurement Status</h2>
                    <canvas id="statusChart" height="260"></canvas>
                </div>

                <!-- Priority -->
                <div class="card">
                    <h2>Priority & Deadlines</h2>
                    <div id="priorityList"></div>
                </div>

                <!-- Pipeline detail -->
                <div class="card full-width">
                    <h2>Curriculum Pipeline — Module-Level Detail</h2>
                    <div class="legend">
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(74, 222, 128, 0.25)"></div> Complete</div>
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(248, 113, 113, 0.12)"></div> Not Complete</div>
                        <div class="legend-item"><div class="legend-swatch" style="background: rgba(148, 163, 184, 0.08)"></div> N/A</div>
                    </div>
                    <div class="filter-bar">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active Only</button>
                        <button class="filter-btn" data-filter="procurement">In-Progress Procurement</button>
                        <button class="filter-btn" data-filter="conversion">In-Progress Conversion</button>
                    </div>
                    <div id="pipelineTable"></div>
                </div>
            </div>
        `;

        renderHeadlines(procurement, assignments);
        renderTimeline(procurement);
        renderStatusChart(procurement);
        renderPriorityList(procurement, assignments);
        renderPipelineTable(procurement, assignments, 'all');

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderPipelineTable(procurement, assignments, btn.dataset.filter);
            });
        });
    }

    function renderHeadlines(procurement, assignments) {
        const container = document.getElementById('headlines');
        const headlines = [];
        const now = new Date();
        const oneWeekFromNow = new Date(now.getTime() + 7 * 86400000);

        // Helper: parse deadline strings like "M2 by 3/31", "U1 by 3/15", "U1 & U2 by 3/15"
        function parseDeadlineDate(dl) {
            const match = dl.match(/(\d{1,2})\/(\d{1,2})/);
            if (match) return new Date(2026, parseInt(match[1]) - 1, parseInt(match[2]));
            return null;
        }

        // 1. Deadlines passed or within the next 7 days
        const deadlineCurricula = new Map(); // code -> { deadline, date, name }
        for (const a of assignments) {
            if (!a.deadline) continue;
            const dlDate = parseDeadlineDate(a.deadline);
            if (!dlDate) continue;
            const existing = deadlineCurricula.get(a.curriculum);
            if (!existing || dlDate < existing.date) {
                deadlineCurricula.set(a.curriculum, {
                    deadline: a.deadline,
                    date: dlDate,
                    name: CURRICULUM_NAMES[a.curriculum] || a.curriculum,
                });
            }
        }

        for (const [code, info] of deadlineCurricula) {
            const daysUntil = Math.ceil((info.date - now) / 86400000);
            if (daysUntil < 0) {
                // Overdue — check if there's still incomplete work
                const hasIncomplete = assignments.some(a =>
                    a.curriculum === code && a.progress.some(p => p === false)
                );
                if (hasIncomplete) {
                    headlines.push({
                        type: 'urgent',
                        icon: '!',
                        text: `<strong>${info.name}</strong> deadline was <strong>${info.deadline.replace(/.*by\s*/, '')}</strong> — has incomplete modules`,
                        sort: 0,
                    });
                }
            } else if (daysUntil <= 7) {
                headlines.push({
                    type: 'warning',
                    icon: '\u23F1',
                    text: `<strong>${info.name}</strong> deadline <strong>${info.deadline}</strong> is ${daysUntil === 0 ? 'today' : `in ${daysUntil} day${daysUntil > 1 ? 's' : ''}`}`,
                    sort: 1,
                });
            }
        }

        // 2. Products almost done (close to completion)
        const almostDone = procurement.filter(p =>
            p.procurementStatus.toLowerCase().includes('almost')
        );
        for (const p of almostDone) {
            headlines.push({
                type: 'good',
                icon: '\u2713',
                text: `<strong>${CURRICULUM_NAMES[p.code] || p.code}</strong> procurement is almost done — nearing completion`,
                sort: 2,
            });
        }

        // 3. Highest priority items that aren't done
        const highestNotDone = procurement.filter(p =>
            p.priority === 'Highest' && !p.procurementStatus.toLowerCase().includes('done')
        );
        for (const p of highestNotDone) {
            headlines.push({
                type: 'urgent',
                icon: '\u2191',
                text: `<strong>${CURRICULUM_NAMES[p.code] || p.code}</strong> is <strong>highest priority</strong> and currently ${p.procurementStatus.toLowerCase()}`,
                sort: 0.5,
            });
        }

        // 4. Products with significant module progress (>75% complete across all assignments)
        const progressByCurriculum = new Map();
        for (const a of assignments) {
            const existing = progressByCurriculum.get(a.curriculum) || { done: 0, total: 0 };
            const checks = a.progress.filter(p => p !== null);
            existing.done += checks.filter(Boolean).length;
            existing.total += checks.length;
            progressByCurriculum.set(a.curriculum, existing);
        }
        for (const [code, prog] of progressByCurriculum) {
            if (prog.total === 0) continue;
            const pct = prog.done / prog.total;
            const procItem = procurement.find(p => p.code === code);
            if (!procItem) continue;
            const s = procItem.procurementStatus.toLowerCase();
            if (s.includes('done')) continue; // already called out
            if (pct >= 0.75 && pct < 1) {
                headlines.push({
                    type: 'info',
                    icon: '\u25B2',
                    text: `<strong>${CURRICULUM_NAMES[code] || code}</strong> is <strong>${Math.round(pct * 100)}%</strong> through module-level work (${prog.done}/${prog.total})`,
                    sort: 3,
                });
            }
        }

        // 5. Products on hold or blocked with notes about next steps
        const onHold = procurement.filter(p =>
            p.assignments?.toLowerCase() === 'hold' && p.nextStep
        );
        for (const p of onHold) {
            const snippet = p.nextStep.length > 80 ? p.nextStep.slice(0, 80) + '...' : p.nextStep;
            headlines.push({
                type: 'info',
                icon: '\u23F8',
                text: `<strong>${CURRICULUM_NAMES[p.code] || p.code}</strong> is on hold — ${snippet}`,
                sort: 4,
            });
        }

        // 6. Upcoming start dates in the next 2 weeks
        for (const p of procurement) {
            const start = parseStartDate(p.startDate);
            if (!start) continue;
            const daysUntilStart = Math.ceil((start - now) / 86400000);
            if (daysUntilStart > 0 && daysUntilStart <= 14 && p.procurementStatus.toLowerCase() === 'not started') {
                headlines.push({
                    type: 'info',
                    icon: '\u2192',
                    text: `<strong>${CURRICULUM_NAMES[p.code] || p.code}</strong> is set to kick off <strong>${p.startDate}</strong> (${daysUntilStart} days)`,
                    sort: 3.5,
                });
            }
        }

        // Sort and render
        headlines.sort((a, b) => a.sort - b.sort);

        if (headlines.length === 0) {
            container.innerHTML = '<div style="color: var(--muted); font-size: 0.85rem;">No notable updates this week.</div>';
            return;
        }

        container.innerHTML = headlines.map(h => `
            <div class="headline-item hl-${h.type}">
                <div class="hl-icon">${h.icon}</div>
                <div class="hl-text">${h.text}</div>
            </div>
        `).join('');
    }

    function renderTimeline(procurement) {
        const container = document.getElementById('timeline');

        // Timeline range: Feb 2026 — Jun 2026
        const timelineStart = new Date(2026, 1, 1);  // Feb 1
        const timelineEnd = new Date(2026, 5, 30);    // Jun 30
        const totalMs = timelineEnd - timelineStart;
        const now = new Date();

        // Months for header
        const months = [
            { label: 'Feb', start: new Date(2026, 1, 1) },
            { label: 'Mar', start: new Date(2026, 2, 1) },
            { label: 'Apr', start: new Date(2026, 3, 1) },
            { label: 'May', start: new Date(2026, 4, 1) },
            { label: 'Jun', start: new Date(2026, 5, 1) },
        ];

        const currentMonth = now.getMonth(); // 0-indexed

        // Filter to active products only and sort by start date / status
        const statusOrder = { 'done': 0, 'almost': 1, 'started': 2, 'not started': 3, 'na': 4 };
        function getStatusKey(s) {
            s = s.toLowerCase();
            if (s.includes('done') && !s.includes('not')) return 'done';
            if (s.includes('almost')) return 'almost';
            if (s === 'started') return 'started';
            if (s === 'not started') return 'not started';
            return 'na';
        }

        const active = procurement
            .filter(p => {
                const s = p.procurementStatus.toLowerCase();
                return s && !s.includes('n/a') && s !== 'hold' && s !== '';
            })
            .sort((a, b) => {
                const sa = statusOrder[getStatusKey(a.procurementStatus)] ?? 9;
                const sb = statusOrder[getStatusKey(b.procurementStatus)] ?? 9;
                if (sa !== sb) return sa - sb;
                const da = parseStartDate(a.startDate);
                const db = parseStartDate(b.startDate);
                if (da && db) return da - db;
                if (da) return -1;
                if (db) return 1;
                return 0;
            });

        // Build HTML
        let html = '<div class="timeline-container"><div class="timeline-chart">';

        // Header
        html += '<div class="timeline-header">';
        html += '<div class="timeline-label-col">Curriculum</div>';
        html += '<div class="timeline-months" style="position: relative;">';
        months.forEach(m => {
            const isCurrent = m.start.getMonth() === currentMonth && m.start.getFullYear() === now.getFullYear();
            html += `<div class="timeline-month ${isCurrent ? 'current' : ''}">${m.label}</div>`;
        });
        html += '</div></div>';

        // Rows
        // Group by status for visual clarity
        const groups = [
            { label: 'Online', items: active.filter(p => getStatusKey(p.procurementStatus) === 'done') },
            { label: 'Coming Soon', items: active.filter(p => ['almost', 'started'].includes(getStatusKey(p.procurementStatus))) },
            { label: 'Upcoming', items: active.filter(p => getStatusKey(p.procurementStatus) === 'not started') },
        ];

        groups.forEach(group => {
            if (group.items.length === 0) return;

            html += `<div class="timeline-section-label">${group.label}</div>`;

            group.items.forEach(proc => {
                const displayName = CURRICULUM_NAMES[proc.code] || proc.code;
                const startDate = parseStartDate(proc.startDate) || new Date(2026, 2, 1);
                const endDate = estimateEndDate(proc, startDate);
                if (!endDate) return;

                const barStart = Math.max(0, (startDate - timelineStart) / totalMs * 100);
                const barEnd = Math.min(100, (endDate - timelineStart) / totalMs * 100);
                const barWidth = Math.max(barEnd - barStart, 1);
                const barClass = timelineBarClass(proc.procurementStatus);

                const statusBadge = `<span class="status-badge ${statusClass(proc.procurementStatus)}" style="font-size: 0.65rem; padding: 2px 6px;">${proc.procurementStatus}</span>`;

                html += `<div class="timeline-row">`;
                html += `<div class="timeline-row-label">${displayName}</div>`;
                html += `<div class="timeline-row-bars" style="position: relative;">`;

                // Grid lines for month boundaries
                months.forEach(m => {
                    const pct = (m.start - timelineStart) / totalMs * 100;
                    html += `<div class="timeline-grid-line" style="left: ${pct}%"></div>`;
                });

                // Today marker
                if (now >= timelineStart && now <= timelineEnd) {
                    const nowPct = (now - timelineStart) / totalMs * 100;
                    html += `<div class="timeline-now" style="left: ${nowPct}%"></div>`;
                }

                // Bar
                const tipText = `${proc.code}: ${proc.procurementStatus}${proc.startDate ? ' | Start: ' + proc.startDate : ''}`;
                html += `<div class="timeline-bar ${barClass} tooltip" data-tip="${tipText}" style="left: ${barStart}%; width: ${barWidth}%;"></div>`;

                html += '</div></div>';
            });
        });

        html += '</div></div>';
        container.innerHTML = html;
    }

    function renderStatusChart(procurement) {
        const counts = { done: 0, almost: 0, started: 0, notStarted: 0, na: 0 };
        for (const p of procurement) {
            const s = p.procurementStatus.toLowerCase();
            if (s.includes('done')) counts.done++;
            else if (s.includes('almost')) counts.almost++;
            else if (s === 'started') counts.started++;
            else if (s === 'not started') counts.notStarted++;
            else counts.na++;
        }

        new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: ['Done', 'Almost Done', 'Started', 'Not Started', 'N/A / Hold'],
                datasets: [{
                    data: [counts.done, counts.almost, counts.started, counts.notStarted, counts.na],
                    backgroundColor: [
                        'rgba(74, 222, 128, 0.8)',
                        'rgba(251, 191, 36, 0.8)',
                        'rgba(56, 189, 248, 0.8)',
                        'rgba(248, 113, 113, 0.8)',
                        'rgba(148, 163, 184, 0.3)',
                    ],
                    borderWidth: 0,
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', padding: 12, usePointStyle: true, pointStyleWidth: 8 }
                    }
                }
            }
        });
    }

    function renderPriorityList(procurement, assignments) {
        const container = document.getElementById('priorityList');
        const prioritized = procurement
            .filter(p => p.priority && !['N/A', 'n/a', ''].includes(p.priority))
            .sort((a, b) => {
                const order = { 'Highest': 0, 'High': 1, 'Medium': 2, 'Low': 3 };
                return (order[a.priority] ?? 9) - (order[b.priority] ?? 9);
            });

        // Build a map of nearest deadline per curriculum from CEC Assignments
        function getNextDeadline(code) {
            const curAssignments = assignments.filter(a => a.curriculum === code && a.deadline);
            if (curAssignments.length === 0) return null;
            // Return the first non-empty deadline found
            return curAssignments[0].deadline;
        }

        let html = '<table class="pipeline-table"><thead><tr><th>Curriculum</th><th>Priority</th><th>Status</th><th>Next Deadline</th></tr></thead><tbody>';
        for (const p of prioritized) {
            const displayName = CURRICULUM_NAMES[p.code] || p.code;
            const deadline = getNextDeadline(p.code);
            html += `<tr>
                <td><strong>${displayName}</strong></td>
                <td><span class="${priorityClass(p.priority)}">${p.priority}</span></td>
                <td><span class="status-badge ${statusClass(p.procurementStatus)}">${p.procurementStatus}</span></td>
                <td>${deadline ? `<span class="deadline-tag">${deadline}</span>` : '<span style="color: var(--muted)">\u2014</span>'}</td>
            </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function renderPipelineTable(procurement, assignments, filter) {
        const container = document.getElementById('pipelineTable');
        let filteredProcurement = [...procurement];

        if (filter === 'active') filteredProcurement = procurement.filter(p =>
            !['n/a', 'hold', ''].includes(p.procurementStatus.toLowerCase()) &&
            !p.procurementStatus.toLowerCase().includes('n/a')
        );

        // For procurement/conversion filters, we filter at the assignment row level
        const taskFilter = (filter === 'procurement') ? 'Procurement' :
                           (filter === 'conversion') ? 'Conversion' : null;

        // When filtering by task type, only show curricula that have matching in-progress rows
        if (taskFilter) {
            const codesWithTask = new Set(
                assignments
                    .filter(a => a.task === taskFilter && a.progress.some(p => p === false))
                    .map(a => a.curriculum)
            );
            filteredProcurement = procurement.filter(p => codesWithTask.has(p.code));
        }

        let html = `<table class="pipeline-table">
            <thead><tr>
                <th>Curriculum</th>
                <th>Status</th>
                <th>Grade / Task</th>
                <th>Module/Unit Progress</th>
                <th>Deadline</th>
            </tr></thead><tbody>`;

        for (const cur of filteredProcurement) {
            let curAssignments = assignments.filter(a => a.curriculum === cur.code);

            // Filter assignments to only the selected task type with incomplete work
            if (taskFilter) {
                curAssignments = curAssignments.filter(a => a.task === taskFilter && a.progress.some(p => p === false));
            }

            const displayName = CURRICULUM_NAMES[cur.code] || cur.code;
            const rowspan = Math.max(curAssignments.length, 1);

            if (curAssignments.length === 0) {
                html += `<tr>
                    <td><strong>${displayName}</strong></td>
                    <td><span class="status-badge ${statusClass(cur.procurementStatus)}">${cur.procurementStatus}</span></td>
                    <td style="color: var(--muted)">\u2014</td>
                    <td style="color: var(--muted)">No module data</td>
                    <td>\u2014</td>
                </tr>`;
                continue;
            }

            curAssignments.forEach((a, idx) => {
                const checks = a.progress.filter(p => p !== null);
                const done = checks.filter(Boolean).length;
                const total = checks.length;
                const convLabel = a.convention === 'Unit' ? 'U' : 'M';

                let moduleCells = '';
                a.progress.forEach((p, mi) => {
                    const cls = p === null ? 'na' : p ? 'done' : 'not-done';
                    moduleCells += `<div class="module-cell ${cls} tooltip" data-tip="${convLabel}${mi + 1}">${convLabel}${mi + 1}</div>`;
                });

                html += '<tr>';
                if (idx === 0) {
                    html += `<td rowspan="${rowspan}"><strong>${displayName}</strong></td>`;
                    html += `<td rowspan="${rowspan}"><span class="status-badge ${statusClass(cur.procurementStatus)}">${cur.procurementStatus}</span></td>`;
                }
                html += `<td>G${a.grade} \u00b7 ${a.task}</td>`;
                html += `<td><div class="module-grid">${moduleCells}</div>
                    <div class="progress-text">${done}/${total} complete</div></td>`;
                html += `<td>${a.deadline ? `<span class="deadline-tag">${a.deadline}</span>` : '\u2014'}</td>`;
                html += '</tr>';
            });
        }

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    async function main() {
        try {
            const [procData, assignData] = await Promise.all([
                fetchGviz(CSV_URLS.procurement),
                fetchGviz(CSV_URLS.assignments),
            ]);

            const procurement = parseProcurement(procData.cols, procData.rows);
            const assignmentsParsed = parseAssignments(assignData.cols, assignData.rows);

            render(procurement, assignmentsParsed);
            document.getElementById('lastRefresh').textContent =
                `Live from Google Sheets \u00b7 ${new Date().toLocaleString()}`;

        } catch (err) {
            console.error('Data fetch failed:', err);

            if (APPS_SCRIPT_URL) {
                try {
                    const resp = await fetch(APPS_SCRIPT_URL);
                    const data = await resp.json();
                    render(parseProcurement([], data.procurement), parseAssignments([], data.assignments));
                    document.getElementById('lastRefresh').textContent =
                        `Live from Google Sheets \u00b7 ${new Date().toLocaleString()}`;
                    return;
                } catch (e) { console.error('Apps Script also failed', e); }
            }

            document.getElementById('app').innerHTML = `
                <div class="card" style="max-width: 600px; margin: 60px auto; text-align: center;">
                    <h2 style="margin-bottom: 12px;">Setup Required</h2>
                    <p style="color: var(--muted); margin-bottom: 20px;">
                        The dashboard needs read access to your Google Sheet.
                    </p>
                    <div style="text-align: left; margin-bottom: 20px;">
                        <p style="margin-bottom: 8px;"><strong>Share the sheet:</strong></p>
                        <ol style="color: var(--muted); font-size: 0.85rem; padding-left: 20px; line-height: 1.8;">
                            <li>Open the Google Sheet</li>
                            <li>Click <strong>Share</strong> \u2192 <strong>General access</strong> \u2192 <strong>"Anyone with the link"</strong> \u2192 <strong>Viewer</strong></li>
                            <li>Reload this page</li>
                        </ol>
                    </div>
                </div>
            `;
        }
    }

    main();
    setInterval(main, 5 * 60 * 1000);
    </script>
